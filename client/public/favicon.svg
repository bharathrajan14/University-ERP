<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#2a5298" />
    </linearGradient>
    <linearGradient id="gradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb703" />
      <stop offset="100%" stop-color="#fb8500" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#gradCap)" />
  
  <!-- Graduation Cap Motif -->
  <g filter="url(#shadow)">
    <!-- Skull Base -->
    <path d="M140,248 L140,335 C140,370 192,395 256,395 C320,395 372,370 372,335 L372,248 C338,270 300,282 256,282 C212,282 174,270 140,248 Z" fill="#ffffff" opacity="0.92" />
    <!-- Mortarboard Top -->
    <polygon points="256,125 436,210 256,295 76,210" fill="#ffffff" />
    <!-- Inner Top Accent -->
    <polygon points="256,145 400,210 256,275 112,210" fill="#f8fafc" opacity="0.6" />
    <!-- Tassel Center Button -->
    <circle cx="256" cy="210" r="14" fill="url(#gradAccent)" />
    <!-- Tassel Cord and Fringe -->
    <path d="M256,210 Q205,230 186,290" fill="none" stroke="url(#gradAccent)" stroke-width="9" stroke-linecap="round" />
    <circle cx="186" cy="302" r="11" fill="url(#gradAccent)" />
  </g>
</svg>